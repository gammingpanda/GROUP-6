
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musanze Order Slip - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: skyblue;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .form-card {
            background: whitesmoke;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .title { 
            color: #2b5297; 
            text-align: center; 
            margin-bottom: 20px; 
        }
        .input-group { 
            margin-bottom: 15px; 
        }
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 5px; 
            font-size: 14px;
         }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        .btn-primary {
            width: 100%;
            background-color: #2b5297;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .error-msg {
            color: #d9534f;
            background: #fce4e4;
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            border: 1px solid #f5c2c2;
        }
        .toggle-text {
             text-align:center;
             margin-top: 20px; 
             font-size: 14px; 
             color: #555; }
        .toggle-link { 
            color: #2b5297; 
            cursor: pointer; 
            font-weight: bold; 
            text-decoration: underline;
         }
         button:hover{
            background-color: #d9534f;
            cursor: pointer;
         }

    </style>
</head>
<body>

    <div class="form-card">
        <h1 class="title">Musanze Order Slip</h1>
        
        <div class="input-group">
            <label>Identify Your Role</label>
            <select id="userRole">
                <option value="aggregator">Potato Aggregator</option>
                <option value="collection">Collection Point</option>
                <option value="transport">Transport Coordinator</option>
            </select>
        </div>

        <form id="loginForm">
            <p id="loginError" class="error-msg"></p>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="enter email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPass" placeholder="enter password">
            </div>
            <button type="button" class="btn-primary" onclick="validateLogin()">Login</button>
            <p class="toggle-text">Don't have an account? <span class="toggle-link" onclick="switchForm('signup')">Sign Up</span></p>
        </form>

        <form id="signupForm" style="display: none;">
            <p id="signError" class="error-msg"></p>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="signName" placeholder="enter full name">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="signEmail" placeholder="enter email">
            </div>
            <div class="input-group">
                <label>Location</label>
                <input type="text" id="signLoc" placeholder="enter location">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signPass" placeholder="create password">
            </div>
            <button type="button" class="btn-primary" onclick="validateSignup()">Create Account</button>
            <p class="toggle-text">Already have an account? <span class="toggle-link" onclick="switchForm('login')">Login</span></p>
        </form>
    </div>

<script>
    function switchForm(mode) {
        document.getElementById('loginForm').style.display = (mode === 'signup') ? 'none' : 'block';
        document.getElementById('signupForm').style.display = (mode === 'signup') ? 'block' : 'none';
        clearErrors();
    }

    function clearErrors() {
        document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
    }

    function showError(element, message) {
        element.innerText = message;
        element.style.display = 'block';
    }

    function validateSignup() {
        const name = document.getElementById('signName').value;
        const email = document.getElementById('signEmail').value;
        const loc = document.getElementById('signLoc').value;
        const pass = document.getElementById('signPass').value;
        const error = document.getElementById('signError');
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!name || !email || !loc || !pass) {
            showError(error, "All fields are required.");
            return;
        } 
        if (!emailPattern.test(email)) {
            showError(error, "Please enter a valid email address.");
            return;
        }
        if (pass.length < 6) {
            showError(error, "Password must be at least 6 characters.");
            return;
        }

        // SAVE USER LOGIC
        const userData = { name, email, loc, pass };
        localStorage.setItem(email, JSON.stringify(userData));
        alert("Account created! Now please login.");
        switchForm('login');
    }

    function validateLogin() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        const error = document.getElementById('loginError');

        if (!email || !pass) {
            showError(error, "Enter both email and password.");
            return;
        }

        const storedUser = localStorage.getItem(email);

        if (!storedUser) {
            showError(error, "Account not found. Please sign up.");
        } else {
            const user = JSON.parse(storedUser);
            if (user.pass === pass) {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("currentUser", user.name);
                window.location.href = "index.html"; // Fixed filename
            } else {
                showError(error, "Wrong password.");
            }
        }
    }
</script>
</body>
</html>
