
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Musanze Order Slip</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Security check
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "login.html";
        }
    </script>
</head>
<body>

<div class="container">
    <button onclick="logout()" style="float: right; background: #d9534f; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold;">
        Back
    </button>
    <h1>Musanze Order Slip</h1>

    <div class="form-section">
        <label>Supplier Name</label>
        <input type="text" id="supplier" placeholder="supplier name">

        <label>Quantity (kg)</label>
        <input type="number" id="quantity" placeholder="enter quantity" min="0">

        <label>Price per kg (RWF)</label>
        <input type="number" id="price" placeholder="enter money per kilo" min="0">

        <button onclick="calculateTotal()">Calculate</button>
    </div>

    <div class="result-section" id="results" style="display: none;">
        <h2>Order Summary</h2>
        <p><strong>Supplier:</strong> <span id="displaySupplier"></span></p>
        <p><strong>Quantity:</strong> <span id="displayQuantity"></span> kg</p>
        <p><strong>Price per kg:</strong> <span id="displayPrice"></span> RWF</p>
        <hr>
        <p class="total"><strong>Total:</strong> <span id="displayTotal"></span> RWF</p>
        <button onclick="window.print()">Print Slip</button>
    </div>
</div>

<script>
    function calculateTotal() {
        const name = document.getElementById('supplier').value;
        const qty = parseFloat(document.getElementById('quantity').value);
        const prc = parseFloat(document.getElementById('price').value);

        // NEGATIVE NUMBER CHECK
        if (qty < 0 || prc < 0) {
            alert("Error: Negative numbers are not allowed.");
            return;
        }

        if (!name || isNaN(qty) || isNaN(prc)) {
            alert("Please fill all fields correctly.");
            return;
        }

        document.getElementById('displaySupplier').innerText = name;
        document.getElementById('displayQuantity').innerText = qty;
        document.getElementById('displayPrice').innerText = prc;
        document.getElementById('displayTotal').innerText = (qty * prc).toLocaleString();
        
        // Show result section
        document.getElementById('results').style.display = 'block';
    }

    function logout() {
        localStorage.removeItem("isLoggedIn");
        window.location.href = "login.html";
    }
</script>
</body>
</html>
